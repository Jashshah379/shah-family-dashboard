<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <meta name="theme-color" content="#070a16"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Shah Family Wealth Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#070a16;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    #loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:radial-gradient(ellipse 80% 50% at 50% -10%,#141b3a 0%,#0a0e1f 50%,#070a16 100%);
      color:#3a4a6a;gap:14px;text-align:center;padding:20px}
    .spin{width:32px;height:32px;border:3px solid #1d2545;border-top-color:#7eb8ff;
      border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="loading">
  <div style="font-size:44px">🏛️</div>
  <div class="spin"></div>
  <div style="font-size:13px;color:#3a4a6a">Loading Shah Family Dashboard...</div>
</div>
<div id="root" style="display:none"></div>

<script>
// Load all scripts sequentially, then start the app
function loadScript(src, onload) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = onload;
  s.onerror = function() { showError('Failed to load: ' + src); };
  document.head.appendChild(s);
}

function showError(msg) {
  document.getElementById('loading').innerHTML =
    '<div style="font-size:32px">⚠️</div>' +
    '<div style="color:#f87171;font-weight:700;font-size:15px">Failed to load dashboard</div>' +
    '<div style="color:#a87070;font-size:12px;max-width:360px;line-height:1.6;margin-top:6px">' + msg + '</div>';
}

function startApp() {
  // All scripts loaded — now fetch and run dashboard
  fetch('./dashboard.jsx')
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.text();
    })
    .then(function(code) {
      // Prepend recharts destructure so dashboard can use components directly
      var rechartsPreamble =
        'var BarChart=Recharts.BarChart,Bar=Recharts.Bar,' +
        'LineChart=Recharts.LineChart,Line=Recharts.Line,' +
        'AreaChart=Recharts.AreaChart,Area=Recharts.Area,' +
        'XAxis=Recharts.XAxis,YAxis=Recharts.YAxis,' +
        'Tooltip=Recharts.Tooltip,' +
        'ResponsiveContainer=Recharts.ResponsiveContainer,' +
        'PieChart=Recharts.PieChart,Pie=Recharts.Pie,Cell=Recharts.Cell,' +
        'Legend=Recharts.Legend,CartesianGrid=Recharts.CartesianGrid,' +
        'ReferenceLine=Recharts.ReferenceLine,' +
        'ScatterChart=Recharts.ScatterChart,Scatter=Recharts.Scatter,' +
        'ComposedChart=Recharts.ComposedChart,LabelList=Recharts.LabelList;';

      // Compile JSX
      var compiled = Babel.transform(rechartsPreamble + '\n' + code, {
        presets: ['react'],
        filename: 'dashboard.jsx',
        sourceType: 'script'
      }).code;

      // Execute
      (new Function(
        'React','ReactDOM','Recharts',
        compiled +
        '\nwindow.AppWithLock=typeof AppWithLock!=="undefined"?AppWithLock:null;' +
        '\nwindow.FamilyApp=typeof FamilyApp!=="undefined"?FamilyApp:null;'
      ))(React, ReactDOM, Recharts);

      var App = window.AppWithLock || window.FamilyApp;
      if (!App) throw new Error('Component not found after execution');

      document.getElementById('loading').style.display = 'none';
      document.getElementById('root').style.display   = 'block';
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    })
    .catch(function(err) { showError(err.message); });
}

// Load dependencies one by one in order
loadScript('https://unpkg.com/react@18/umd/react.production.min.js', function() {
  loadScript('https://unpkg.com/react-dom@18/umd/react-dom.production.min.js', function() {
    loadScript('https://unpkg.com/recharts@2.12.7/umd/Recharts.js', function() {
      loadScript('https://unpkg.com/@babel/standalone@7.23.10/babel.min.js', function() {
        startApp();
      });
    });
  });
});
</script>
</body>
</html>
