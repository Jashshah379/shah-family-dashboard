<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#070a16"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Shah Family Wealth Dashboard</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏛️</text></svg>"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:#070a16;font-family:'Inter',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
    #loading{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
      background:radial-gradient(ellipse 80% 50% at 50% -10%,#141b3a 0%,#0a0e1f 50%,#070a16 100%);
      color:#3a4a6a;gap:14px;text-align:center;padding:20px}
    .spin{width:32px;height:32px;border:3px solid #1d2545;border-top-color:#7eb8ff;
      border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="loading">
  <div style="font-size:44px">🏛️</div>
  <div class="spin" id="spinner"></div>
  <div id="status" style="font-size:13px;color:#3a4a6a">Loading dependencies...</div>
</div>
<div id="root" style="display:none"></div>

<script>
var CDNS = [
  {
    react:    'https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js',
    reactdom: 'https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js',
    recharts: 'https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js',
    babel:    'https://cdn.jsdelivr.net/npm/@babel/standalone@7.23.10/babel.min.js',
  },
  {
    react:    'https://unpkg.com/react@18/umd/react.production.min.js',
    reactdom: 'https://unpkg.com/react-dom@18/umd/react-dom.production.min.js',
    recharts: 'https://unpkg.com/recharts@2.12.7/umd/Recharts.js',
    babel:    'https://unpkg.com/@babel/standalone@7.23.10/babel.min.js',
  },
  {
    react:    'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
    reactdom: 'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
    recharts: 'https://cdn.jsdelivr.net/npm/recharts@2.12.7/umd/Recharts.js',
    babel:    'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.10/babel.min.js',
  }
];

function setStatus(msg) {
  document.getElementById('status').textContent = msg;
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('loading').innerHTML =
    '<div style="font-size:32px">⚠️</div>' +
    '<div style="color:#f87171;font-weight:700;font-size:15px">Failed to load dashboard</div>' +
    '<div style="color:#a87070;font-size:12px;max-width:380px;line-height:1.7;margin-top:8px">' + msg + '</div>' +
    '<div style="color:#3a2020;font-size:10px;margin-top:10px">Try opening the page while connected to the internet</div>';
}

function loadScript(src) {
  return new Promise(function(resolve, reject) {
    // Check if already loaded
    if (src.includes('react.production') && window.React) return resolve();
    if (src.includes('react-dom') && window.ReactDOM) return resolve();
    if (src.includes('Recharts') && window.Recharts) return resolve();
    if (src.includes('babel') && window.Babel) return resolve();

    var s = document.createElement('script');
    s.src = src;
    s.onload = resolve;
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function tryLoadFrom(cdn) {
  return loadScript(cdn.react)
    .then(function() { return loadScript(cdn.reactdom); })
    .then(function() { return loadScript(cdn.recharts); })
    .then(function() { return loadScript(cdn.babel); });
}

function loadWithFallbacks(cdnList, index) {
  if (index >= cdnList.length) {
    showError('Could not load libraries from any CDN. Make sure you are connected to the internet and try refreshing.');
    return;
  }
  setStatus('Loading libraries (attempt ' + (index+1) + ')...');
  tryLoadFrom(cdnList[index])
    .then(function() {
      setStatus('Starting dashboard...');
      startApp();
    })
    .catch(function() {
      loadWithFallbacks(cdnList, index + 1);
    });
}

function startApp() {
  fetch('./dashboard.jsx')
    .then(function(r) {
      if (!r.ok) throw new Error('Could not load dashboard.jsx (HTTP ' + r.status + ')');
      return r.text();
    })
    .then(function(code) {
      setStatus('Compiling dashboard...');

      // Compile dashboard JSX (no preamble - recharts passed as function args)
      var compiled = Babel.transform(code, {
        presets: ['react'],
        filename: 'dashboard.jsx',
        sourceType: 'script'
      }).code;

      // Pass all recharts components as named arguments so they are in scope
      var R = Recharts;
      (new Function(
        'React','ReactDOM','Recharts',
        'BarChart','Bar','LineChart','Line','AreaChart','Area',
        'XAxis','YAxis','Tooltip','ResponsiveContainer',
        'PieChart','Pie','Cell','Legend','CartesianGrid','ReferenceLine',
        'ScatterChart','Scatter','ComposedChart','LabelList',
        compiled
      ))(
        React, ReactDOM, Recharts,
        R.BarChart, R.Bar, R.LineChart, R.Line, R.AreaChart, R.Area,
        R.XAxis, R.YAxis, R.Tooltip, R.ResponsiveContainer,
        R.PieChart, R.Pie, R.Cell, R.Legend, R.CartesianGrid, R.ReferenceLine,
        R.ScatterChart, R.Scatter, R.ComposedChart, R.LabelList
      );

      var App = window.AppWithLock || window.FamilyApp;
      if (!App) throw new Error('Dashboard component not found');

      document.getElementById('loading').style.display = 'none';
      document.getElementById('root').style.display = 'block';
      ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
    })
    .catch(function(err) {
      showError(err.message);
    });
}

// Start loading
loadWithFallbacks(CDNS, 0);
</script>
</body>
</html>
